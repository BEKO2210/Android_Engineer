name: Release Slate APK

on:
  push:
    tags:
      - 'v*'  # Triggered when you push a tag like v1.0.0

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write  # Required to create GitHub Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          yes | sdkmanager --install "ndk;27.2.12479018" "cmake;3.22.1" || true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew testDebugUnitTest --no-configuration-cache

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-configuration-cache

      - name: Rename APK with version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cp app/build/outputs/apk/release/app-release-unsigned.apk \
             app/build/outputs/apk/release/slate-${VERSION}-arm64-v8a-unsigned.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Slate ${{ github.ref_name }}
          body: |
            ## Slate ${{ github.ref_name }}

            Private AI on your device. Download and run local LLMs entirely offline.

            ### Install
            1. Download the APK below
            2. Transfer to your Android device (arm64)
            3. Open and install (enable "Unknown sources" if prompted)
            4. Follow the onboarding flow

            ### Requirements
            - Android 8.0+ (API 26)
            - ARM64 device (arm64-v8a)
            - 4 GB+ RAM (6 GB+ recommended)
            - 2+ GB free storage for model downloads

            ### Note
            This is an **unsigned** APK. For signed builds, see RELEASE.md.

            See [RELEASE.md](RELEASE.md) for full release notes and known limitations.
          files: |
            app/build/outputs/apk/release/slate-*-unsigned.apk
          draft: false
          prerelease: false
