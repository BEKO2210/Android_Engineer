name: Release Slate

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          yes | sdkmanager --install "ndk;27.2.12479018" "cmake;3.22.1" || true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew testDebugUnitTest --no-configuration-cache

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-configuration-cache

      - name: Rename APK
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cp app/build/outputs/apk/release/app-release.apk \
             "Slate-${VERSION}-release.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Slate ${{ github.ref_name }}
          body: |
            ## Slate ${{ github.ref_name }}

            Private AI on your device. Download and run local LLMs entirely offline.

            ### Download
            Download **Slate-${{ github.ref_name }}-release.apk** below and install on your Android device (ARM64).

            ### Requirements
            - Android 8.0+ (API 26)
            - ARM64 device (arm64-v8a)
            - 4 GB+ RAM (6 GB+ recommended)
            - 1-3 GB free storage per model

            See [CHANGELOG.md](CHANGELOG.md) for details.
          files: Slate-*-release.apk
          draft: false
          prerelease: false
