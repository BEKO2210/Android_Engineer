name: Build Slate APK

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Slate APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0  # Full history for version counting

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          yes | sdkmanager --install "ndk;27.2.12479018" "cmake;3.22.1" || true

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Get version info
        id: version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          MAJOR=1
          MINOR=$((COMMIT_COUNT / 10))
          PATCH=$((COMMIT_COUNT % 10))
          VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "Version: $VERSION (build $COMMIT_COUNT)"

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-configuration-cache

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-configuration-cache

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-configuration-cache

      - name: Rename APKs
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk "artifacts/Slate-${VERSION}-debug.apk"
          cp app/build/outputs/apk/release/app-release.apk "artifacts/Slate-${VERSION}-release.apk"
          ls -lh artifacts/

      - name: Upload Slate Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: Slate-${{ steps.version.outputs.version }}-debug
          path: artifacts/Slate-*-debug.apk
          retention-days: 30

      - name: Upload Slate Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Slate-${{ steps.version.outputs.version }}-release
          path: artifacts/Slate-*-release.apk
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/build/test-results/testDebugUnitTest/*.xml'
          retention-days: 14
